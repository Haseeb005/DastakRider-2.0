openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Dastak Rider App API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Rider authentication
  - name: orders
    description: Order management
  - name: earnings
    description: Rider earnings
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /rider/register:
    post:
      operationId: registerRider
      tags: [auth]
      summary: Register a new rider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RiderRegisterInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rider"
        "400":
          description: Bad request
        "409":
          description: Phone already registered

  /rider/login:
    post:
      operationId: loginRider
      tags: [auth]
      summary: Login a rider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RiderLoginInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rider"
        "401":
          description: Invalid credentials

  /rider/logout:
    post:
      operationId: logoutRider
      tags: [auth]
      summary: Logout a rider
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /rider/me:
    get:
      operationId: getRiderMe
      tags: [auth]
      summary: Get current rider profile
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rider"
        "401":
          description: Not authenticated

  /rider/availability:
    put:
      operationId: updateRiderAvailability
      tags: [auth]
      summary: Toggle rider online/offline status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AvailabilityInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvailabilityResponse"

  /rider/orders/available:
    get:
      operationId: getAvailableOrders
      tags: [orders]
      summary: Get available (unassigned) orders
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RiderOrder"

  /rider/orders/active:
    get:
      operationId: getActiveOrders
      tags: [orders]
      summary: Get rider's active deliveries
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RiderOrder"

  /rider/orders/history:
    get:
      operationId: getOrderHistory
      tags: [orders]
      summary: Get rider's completed deliveries
      parameters:
        - name: period
          in: query
          required: false
          schema:
            type: string
            enum: [today, week, month, all]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RiderOrder"

  /rider/orders/{orderId}/accept:
    post:
      operationId: acceptOrder
      tags: [orders]
      summary: Accept an available order
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiderOrder"
        "400":
          description: Already has active delivery
        "409":
          description: Order already taken

  /rider/orders/{orderId}/arrived:
    post:
      operationId: markOrderArrived
      tags: [orders]
      summary: Mark that the rider has arrived at the restaurant
      description: >-
        Records an additive checkpoint that the rider reached the restaurant.
        The canonical order status stays "Rider Accepted"; only riderArrived is set.
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiderOrder"
        "409":
          description: Order not assigned to you or wrong state

  /rider/orders/{orderId}/status:
    put:
      operationId: updateOrderStatus
      tags: [orders]
      summary: Update delivery status
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderStatusInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiderOrder"

  /rider/earnings:
    get:
      operationId: getRiderEarnings
      tags: [earnings]
      summary: Get rider earnings summary
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EarningsSummary"

  /rider/location:
    post:
      operationId: pushRiderLocation
      tags: [orders]
      summary: Push the rider's current GPS location for an active order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RiderLocationInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /orders/{orderId}/rider-location:
    get:
      operationId: getRiderLocation
      tags: [orders]
      summary: Get the rider's current location for an order (public)
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiderLocation"
        "404":
          description: No recent location

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    OkResponse:
      type: object
      properties:
        ok:
          type: boolean
      required:
        - ok

    OrderItem:
      type: object
      properties:
        name:
          type: string
        quantity:
          type: number
        price:
          type: number
        size:
          type: ["string", "null"]
        type:
          type: ["string", "null"]
          description: Product type from the order, e.g. "single" or "deal".
        dealItems:
          type: array
          description: For deal products, the included choices (from selectedFlavours).
          items:
            $ref: "#/components/schemas/DealItem"
      required:
        - name
        - quantity
        - price

    DealItem:
      type: object
      properties:
        title:
          type: ["string", "null"]
        option:
          type: ["string", "null"]
        price:
          type: number

    Rider:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        phone:
          type: string
        city:
          type: string
        vehicleType:
          type: string
        isOnline:
          type: boolean
        totalEarnings:
          type: number
        totalDeliveries:
          type: number
        rating:
          type: number
        ratingCount:
          type: number
        riderZones:
          type: array
          items:
            type: string
        pendingCollection:
          type: number
        unpaidCollection:
          type: number
        tillNoonFare:
          type: number
        available:
          type: boolean
          description: Whether admin has enabled this rider to go online. false = blocked by admin.
        token:
          type: string
          description: HMAC bearer token, returned only by login/register for mobile clients
      required:
        - id
        - name
        - phone
        - city
        - vehicleType
        - isOnline
        - totalEarnings
        - totalDeliveries
        - rating
        - ratingCount

    RiderOrder:
      type: object
      properties:
        id:
          type: string
        restaurantName:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        latitude:
          type: ["number", "null"]
        longitude:
          type: ["number", "null"]
        martLatitude:
          type: ["number", "null"]
        martLongitude:
          type: ["number", "null"]
        phone:
          type: ["string", "null"]
        status:
          type: string
        total:
          type: number
        deliveryFee:
          type: number
          description: Customer-facing delivery charge on the bill. NOT the rider's pay — use riderFare for the rider's earnings.
        subtotal:
          type: number
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        userName:
          type: ["string", "null"]
        city:
          type: ["string", "null"]
        zone:
          type: ["string", "null"]
        distance:
          type: ["string", "null"]
        martAddress:
          type: ["string", "null"]
        martPhone:
          type: ["string", "null"]
        paymentType:
          type: ["string", "null"]
        orderNum:
          type: ["string", "null"]
        comment:
          type: ["string", "null"]
        riderFare:
          type: number
          description: The rider's payout for this order = the rider's current tillNoonFare (from their users-collection doc), falling back to the per-order snapshot when unset. The rider's earnings, distinct from deliveryFee (customer charge).
        tip:
          type: number
        discount:
          type: number
        platformFee:
          type: number
        vatAmount:
          type: number
        paidToRider:
          type: boolean
        actions:
          type: array
          items:
            $ref: "#/components/schemas/OrderAction"
        acceptedTime:
          type: ["string", "null"]
        pickUpTime:
          type: ["string", "null"]
        timeWhenDelivered:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: ["string", "null"]
        riderId:
          type: ["string", "null"]
        riderName:
          type: ["string", "null"]
        riderArrived:
          type: boolean
      required:
        - id
        - status
        - total
        - deliveryFee
        - subtotal
        - createdAt

    OrderAction:
      type: object
      properties:
        action:
          type: string
        time:
          type: string
        name:
          type: string

    EarningsSummary:
      type: object
      properties:
        totalEarnings:
          type: number
        totalDeliveries:
          type: number
        totalOrderAmount:
          type: number
        todayEarnings:
          type: number
        todayDeliveries:
          type: number
        todayOrderAmount:
          type: number
        weekEarnings:
          type: number
        weekDeliveries:
          type: number
        weekOrderAmount:
          type: number
        monthEarnings:
          type: number
        monthDeliveries:
          type: number
        monthOrderAmount:
          type: number
        rating:
          type: number
        ratingCount:
          type: number
        pendingCollection:
          type: number
        unpaidCollection:
          type: number
      required:
        - totalEarnings
        - totalDeliveries
        - todayEarnings
        - todayDeliveries
        - weekEarnings
        - weekDeliveries
        - rating
        - ratingCount

    RiderLocationInput:
      type: object
      properties:
        orderId:
          type: string
        lat:
          type: number
        lng:
          type: number
      required:
        - orderId
        - lat
        - lng

    RiderLocation:
      type: object
      properties:
        lat:
          type: number
        lng:
          type: number
        ts:
          type: number
      required:
        - lat
        - lng
        - ts

    RiderRegisterInput:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        password:
          type: string
        city:
          type: string
        vehicleType:
          type: string
      required:
        - name
        - phone
        - password
        - city
        - vehicleType

    RiderLoginInput:
      type: object
      properties:
        phone:
          type: string
        password:
          type: string
      required:
        - phone
        - password

    AvailabilityInput:
      type: object
      properties:
        isOnline:
          type: boolean
      required:
        - isOnline

    AvailabilityResponse:
      type: object
      properties:
        ok:
          type: boolean
        isOnline:
          type: boolean
      required:
        - ok
        - isOnline

    OrderStatusInput:
      type: object
      properties:
        status:
          type: string
      required:
        - status
